<mat-toolbar color="primary" class="custom-toolbar">

  <div class="toolbar-side left">
    <span class="app-title">The Wine Square Cellar Management Platform</span>
  </div>

  <div class="toolbar-center">
    @for (option of options(); track option.path) {
      <a mat-button [routerLink]="option.path" routerLinkActive="active-link">
        {{ option.title }}
      </a>
    }
  </div>

  <div class="toolbar-side right">
    <button mat-button>EN</button>
    <button mat-button>ES</button>
  </div>

</mat-toolbar>

<main style="padding: 20px;">
  <router-outlet></router-outlet>
</main>

<app-footer-content></app-footer-content>
